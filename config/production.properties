# =============================================================
# Acme Health Clinical Reports - Production Configuration
# Server: rpt-prod-01.acmehealth.internal
# Last updated: 2024-01-09 by Sarah Kim
#
# DO NOT EDIT THIS FILE ON THE SERVER DIRECTLY.
# Changes must go through the deployment pipeline (Jenkins).
# See: https://jenkins.acmehealth.internal/job/clinical-reports/
# =============================================================

# Database connection
# Points to the clinical data warehouse (read-only replica)
db.host=acme-warehouse-prod.internal
db.port=5432
db.name=clinical_warehouse
db.user=report_svc
db.password=${DB_PASSWORD}
db.schema=public

# Report output directory
# NFS mount shared with the document management system (OnBase)
report.output.dir=/data/reports/output
report.template.dir=/opt/acmehealth/reports/templates

# SMTP for automated report delivery
# Uses the internal relay (no auth required from the report server)
smtp.host=mail.acmehealth.internal
smtp.port=25
smtp.from=reports@acmehealth.com

# Report retention (days) - used by the cleanup cron job
report.retention.days=90

# Logging
log.level=INFO
log.file=/var/log/acmehealth/reports.log

# Performance tuning
# Marcus bumped this to 512m after the monthly revenue report OOM'd
# for December 2023 (high volume month). - Sarah
java.heap.max=512m
