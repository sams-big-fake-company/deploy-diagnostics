# =============================================================
# Acme Health Clinical Reports - Staging Configuration
# Server: rpt-stg-01.acmehealth.internal
#
# NOTE: Staging DB has a 2-week-old snapshot of production data
# that gets refreshed on the 1st and 15th of each month.
# Patient data is partially anonymized (names scrambled, SSNs removed)
# but MRNs are preserved for cross-referencing.
#
# Last updated: 2023-11-15 by Sarah Kim
# =============================================================

# Database connection
# Staging warehouse - refreshed biweekly from prod
db.host=acme-warehouse-stg.internal
db.port=5432
db.name=clinical_warehouse_stg
db.user=report_svc_stg
db.password=${DB_PASSWORD}
db.schema=public

# Report output
report.output.dir=/data/reports/staging-output
report.template.dir=/opt/acmehealth/reports/templates

# SMTP - staging uses Mailhog so emails don't actually send
smtp.host=mailhog.acmehealth.internal
smtp.port=1025
smtp.from=reports-staging@acmehealth.com

# Report retention (days)
report.retention.days=30

# Logging
log.level=DEBUG
log.file=/var/log/acmehealth/reports-staging.log

# Performance tuning
java.heap.max=256m
